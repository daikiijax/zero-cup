kind = "web"
previewPath = "/"
title = "0G AI Compute Dashboard"
version = "1.0.0"
id = "artifacts/compute-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23196

[services.development]
run = "pnpm --filter @workspace/compute-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/compute-dashboard", "run", "build" ]
publicDir = "artifacts/compute-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23196"
BASE_PATH = "/"
