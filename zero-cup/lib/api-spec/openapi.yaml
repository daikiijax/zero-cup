openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: 0G Compute Network Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: inference
    description: AI inference jobs
  - name: providers
    description: Network providers
  - name: wallet
    description: Wallet operations
  - name: stats
    description: Dashboard statistics
  - name: activity
    description: Activity logs

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /inference:
    post:
      operationId: submitInference
      tags: [inference]
      summary: Submit an inference job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InferenceInput"
      responses:
        "202":
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InferenceJob"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listInferenceJobs
      tags: [inference]
      summary: List inference jobs
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InferenceJob"

  /inference/{id}:
    get:
      operationId: getInferenceJob
      tags: [inference]
      summary: Get a specific inference job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InferenceJob"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /providers:
    get:
      operationId: listProviders
      tags: [providers]
      summary: List available network providers
      responses:
        "200":
          description: List of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Provider"

  /wallet/info:
    get:
      operationId: getWalletInfo
      tags: [wallet]
      summary: Get wallet info and balance
      responses:
        "200":
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletInfo"
        "400":
          description: Private key not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /activity:
    get:
      operationId: listActivity
      tags: [activity]
      summary: List activity log entries
      responses:
        "200":
          description: Activity entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    InferenceInput:
      type: object
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 8000
        model:
          type: string
          minLength: 1
        providerAddress:
          type: string
          nullable: true
        maxTokens:
          type: integer
          minimum: 1
          maximum: 8192
          nullable: true
        temperature:
          type: number
          minimum: 0
          maximum: 2
          nullable: true
      required:
        - prompt
        - model

    InferenceJob:
      type: object
      properties:
        id:
          type: string
        prompt:
          type: string
        model:
          type: string
        providerAddress:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, running, completed, failed]
        result:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        inputTokens:
          type: integer
          nullable: true
        outputTokens:
          type: integer
          nullable: true
        latencyMs:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - prompt
        - model
        - status
        - createdAt

    Provider:
      type: object
      properties:
        address:
          type: string
        name:
          type: string
        models:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [online, offline, unknown]
        latencyMs:
          type: number
          nullable: true
        pricePerToken:
          type: number
          nullable: true
      required:
        - address
        - name
        - models
        - status

    WalletInfo:
      type: object
      properties:
        address:
          type: string
        balanceEther:
          type: number
        network:
          type: string
        chainId:
          type: string
        testnetTokensUsed:
          type: integer
        mainnetTokensUsed:
          type: integer
      required:
        - address
        - balanceEther
        - network
        - chainId
        - testnetTokensUsed
        - mainnetTokensUsed

    DashboardStats:
      type: object
      properties:
        totalRequests:
          type: integer
        successfulRequests:
          type: integer
        failedRequests:
          type: integer
        avgLatencyMs:
          type: number
          nullable: true
        totalTokensUsed:
          type: integer
        testnetTokensUsed:
          type: integer
        mainnetTokensUsed:
          type: integer
        activeProviders:
          type: integer
        requestsToday:
          type: integer
        tokensToday:
          type: integer
      required:
        - totalRequests
        - successfulRequests
        - failedRequests
        - totalTokensUsed
        - testnetTokensUsed
        - mainnetTokensUsed
        - activeProviders
        - requestsToday
        - tokensToday

    ActivityEntry:
      type: object
      properties:
        id:
          type: string
        level:
          type: string
          enum: [info, success, warn, error]
        message:
          type: string
        detail:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
        jobId:
          type: string
          nullable: true
      required:
        - id
        - level
        - message
        - timestamp

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
